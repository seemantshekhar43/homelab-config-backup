arch: amd64
cores: 2
features: keyctl=1
hostname: logging
memory: 1024
nameserver: 192.168.0.160 1.1.1.1
net0: name=eth0,bridge=vmbr0,gw=192.168.0.1,hwaddr=BC:24:11:B9:96:21,ip=192.168.0.162/24,type=veth
onboot: 1
ostype: debian
rootfs: local-lvm:vm-162-disk-0,size=10G
swap: 512
tags: logs
timezone: Asia/Kolkata
unprivileged: 1
